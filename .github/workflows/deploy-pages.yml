name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Notify IndexNow
        run: |
          urls=$(grep -o '<loc>[^<]*</loc>' website/sitemap.xml | sed -e 's/<loc>//' -e 's#</loc>##')
          url_json=$(printf '%s\n' "$urls" | jq -R . | jq -s .)
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{\"host\":\"whygodexists.org\",\"key\":\"d1efd61d0d624acebe8352f14098cfb2\",\"keyLocation\":\"https://whygodexists.org/d1efd61d0d624acebe8352f14098cfb2.txt\",\"urlList\":$url_json}"
